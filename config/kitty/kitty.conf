# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# GitHub Dark
include current-theme.conf
# END_KITTY_THEME

# ---------------------------------------------------------------
# Font
# ---------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
font_size        12.0
disable_ligatures never

# ---------------------------------------------------------------
# Font size
# ---------------------------------------------------------------
map ctrl+equal              change_font_size all +1.0
map ctrl+minus              change_font_size all -1.0
map ctrl+0                  change_font_size all 0

# ---------------------------------------------------------------
# Cursor
# ---------------------------------------------------------------
cursor_shape           block
cursor_beam_thickness  1.5
cursor_blink_interval  0.5
cursor            #00d7ff
cursor_text_color #111111

# ---------------------------------------------------------------
# Window
# ---------------------------------------------------------------
background_opacity   0.75
window_padding_width        8

remember_window_size        no
initial_window_width        1200
initial_window_height       700

# ---------------------------------------------------------------
# Tabs
# ---------------------------------------------------------------
map ctrl+shift+t            new_tab_with_cwd
map ctrl+shift+w            close_tab
map ctrl+shift+right        next_tab
map ctrl+shift+left         previous_tab
map ctrl+shift+1            goto_tab 1
map ctrl+shift+2            goto_tab 2
map ctrl+shift+3            goto_tab 3
map ctrl+shift+4            goto_tab 4
map ctrl+shift+5            goto_tab 5


# ---------------------------------------------------------------
# Splits / Borders
# ---------------------------------------------------------------
enabled_layouts             splits, stack
window_border_width         0.5pt

active_border_color         #00d7ff
inactive_border_color       #1e222a
inactive_text_alpha         0.7

draw_minimal_borders        no

# ---------------------------------------------------------------
# Splits
# ---------------------------------------------------------------
map ctrl+shift+d launch --cwd=current --location=vsplit
map ctrl+shift+s launch --cwd=current --location=hsplit

map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+k neighboring_window up
map ctrl+shift+j neighboring_window down

map ctrl+shift+z            toggle_layout stack

# ---------------------------------------------------------------
# Copy/Paste
# ---------------------------------------------------------------
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# ---------------------------------------------------------------
# Scrollback
# ---------------------------------------------------------------
map ctrl+shift+up           scroll_line_up
map ctrl+shift+down         scroll_line_down
map ctrl+shift+page_up      scroll_page_up
map ctrl+shift+page_down    scroll_page_down
map ctrl+shift+home         scroll_home
map ctrl+shift+end          scroll_end

scrollback_lines            1000
# ---------------------------------------------------------------
# Performance
# ---------------------------------------------------------------
repaint_delay               8
input_delay                 2
sync_to_monitor             yes

# ---------------------------------------------------------------
# Mouse
# ---------------------------------------------------------------
mouse_hide_wait             3.0
url_style                   curly
open_url_with               default
copy_on_select              no

# ---------------------------------------------------------------
# Bell
# ---------------------------------------------------------------
enable_audio_bell           yes
visual_bell_duration        0.0

# ---------------------------------------------------------------
# Misc
# ---------------------------------------------------------------
map ctrl+shift+r            load_config_file
map ctrl+shift+f            show_scrollback
